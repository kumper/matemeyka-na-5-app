<app-card>
  @if (game.currentQuestion(); as q) {

    <!-- Header: progress + score -->
    <div class="d-flex justify-content-between align-items-center mb-3">
      <small class="opacity-75">
        Pytanie {{ game.questionsAnswered() + 1 }} / 25
      </small>
      <span class="badge bg-secondary fs-6">
        🏆 {{ game.score() }} pkt
      </span>
      <span class="badge bg-dark border">
        Poziom {{ game.currentDifficulty() }}
      </span>
    </div>

    <!-- Progress bar -->
    <div class="progress mb-4" style="height: 6px;" role="progressbar"
         [attr.aria-valuenow]="game.progress()"
         aria-valuemin="0" aria-valuemax="100"
         [attr.aria-label]="'Postęp quizu: ' + game.progress() + '%'">
      <div class="progress-bar bg-primary"
           [style.width.%]="game.progress()">
      </div>
    </div>

    <!-- Question -->
    <div class="text-center mb-4">
      <app-question-display [question]="q.question" />
    </div>

    <!-- Answer buttons -->
    <div class="d-grid gap-2 mb-3">
      @for (answer of q.answers; track answer.id) {
        <button
          type="button"
          class="btn btn-lg text-start"
          [class.btn-outline-light]="selectedAnswerId() !== answer.id"
          [class.btn-primary]="selectedAnswerId() === answer.id"
          [attr.aria-pressed]="selectedAnswerId() === answer.id"
          (click)="select(answer.id)"
        >
          <span class="fw-bold me-2">{{ answer.id | uppercase }})</span>{{ answer.label }}
        </button>
      }
    </div>

    <!-- Confirm button -->
    <div class="d-grid">
      <button
        type="button"
        class="btn btn-success btn-lg"
        [disabled]="!answered()"
        (click)="confirm()"
      >
        Zatwierdź odpowiedź ✔
      </button>
    </div>

  } @else {
    <p class="text-center opacity-75 mb-0">Ładowanie pytania...</p>
  }
</app-card>
