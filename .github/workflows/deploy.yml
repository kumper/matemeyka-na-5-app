name: Deploy to GitHub Pages

on:
  push:
    branches:
      - master
  workflow_dispatch:  # allows manual trigger

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Show logs
        if: failure()
        run: cat /home/runner/.npm/_logs/*.log

      - name: Build Angular app
        run: npx ng build --configuration production --base-href /algebra-na-5-app/

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: 'dist/algebra-na-5/browser'  # Angular 17+ output path

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
